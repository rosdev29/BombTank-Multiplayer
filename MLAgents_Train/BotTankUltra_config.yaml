behaviors:
  BotTankUltra:
    trainer_type: ppo
    hyperparameters:
      learning_rate: 8.0e-4
      learning_rate_schedule: linear
      batch_size: 512
      buffer_size: 4096
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 20000
